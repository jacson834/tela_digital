<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Tela Digital</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%234F46E5'%3E%3Cpath d='M21 3H3c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h5v2h8v-2h5c1.1 0 1.99-.9 1.99-2L23 5c0-1.1-.9-2-2-2zm0 14H3V5h18v12zm-5-6l-7 4V7z'/%3E%3C/svg%3E" type="image/svg+xml">

<style>
body {
    margin: 0;
    background: black;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
}

#player {
    width: 100%;
    height: 100%;
}

img, video, iframe {
    width: 100%;
    height: 100%;
    object-fit: contain;
    background: black;
}
</style>
</head>

<body>

<div id="player"></div>

<script>

var API_URL = "playlist.json";

var playlist = [];
var current = 0;
var timerId = null;

// 🔄 Atualiza a cada 10 minutos
setInterval(function() { loadData(); }, 10 * 60 * 1000);

// ⏱️ Converter tempo
function parseTime(time) {
    if (!time) return 10000;

    var parts = time.split(":");
    return (parseInt(parts[0], 10) * 3600 +
            parseInt(parts[1], 10) * 60 +
            parseInt(parts[2], 10)) * 1000;
}

// 📅 Validar período de exibição (startDate e endDate)
function isDateValid(startStr, endStr) {
    var now = new Date().getTime();

    // Subfunção para transformar o texto da planilha em uma Data real no código
    function parseDate(str, isEnd) {
        if (!str) return null; // Se estiver em branco, ignora o limite
        var parts = String(str).trim().split(" ");
        
        if (parts[0].indexOf("/") !== -1) {
            var d = parts[0].split("/");
            if (d.length === 3) {
                var day = parseInt(d[0], 10);
                var month = parseInt(d[1], 10) - 1; // Mês no JS começa no 0
                var year = d[2].length === 2 ? 2000 + parseInt(d[2], 10) : parseInt(d[2], 10);
                
                var h = 0, m = 0, s = 0;
                if (parts[1]) {
                    var t = parts[1].split(":");
                    h = parseInt(t[0], 10) || 0; m = parseInt(t[1], 10) || 0; s = parseInt(t[2], 10) || 0;
                } else if (isEnd) {
                    h = 23; m = 59; s = 59; // Se for o dia final sem horário, estende até o último segundo
                }
                return new Date(year, month, day, h, m, s).getTime();
            }
        }
        // Formato Padrão ISO (YYYY-MM-DD)
        var fallback = new Date(str).getTime();
        return isNaN(fallback) ? null : fallback;
    }

    var startDate = parseDate(startStr, false);
    var endDate = parseDate(endStr, true);

    if (startDate && now < startDate) return false; // Ainda não chegou a hora
    if (endDate && now > endDate) return false;     // Já passou da validade

    return true; // Dentro do período!
}

//  Converter Google Drive
function convertDrive(url, type) {
    if (url.indexOf("drive.google.com") !== -1) {
        var id = url.match(/\/d\/(.*?)\//) || url.match(/id=(.*?)&/) || url.match(/id=([^&]*)/);
        if (id && id[1]) {
            if (type === "image") {
                // Usa o endpoint de thumbnail para evitar bloqueio de OpaqueResponse/CORS em imagens do Drive
                return "https://drive.google.com/thumbnail?id=" + id[1] + "&sz=w1920-h1080";
            }
            // Para vídeos, o Drive bloqueia stream direto. Retorna a página oficial de preview para uso no Iframe.
            return "https://drive.google.com/file/d/" + id[1] + "/preview";
        }
    }
    return url;
}

// ▶️ Detectar YouTube
function isYoutube(url) {
    return url.indexOf("youtube") !== -1 || url.indexOf("youtu.be") !== -1;
}

function youtubeEmbed(url) {
    var id;

    if (url.indexOf("v=") !== -1) {
        id = url.split("v=")[1].split("&")[0];
    } else {
        id = url.split("/").pop().split("?")[0];
    }

    // Parâmetros extras para deixar o player invisível e livre de poluição visual.
    // cc_load_policy=1 e hl=pt-br ativam as legendas do YouTube em português.
    return "https://www.youtube.com/embed/" + id + "?autoplay=1&mute=1&controls=0&showinfo=0&rel=0&loop=1&playlist=" + id + "&modestbranding=1&iv_load_policy=3&disablekb=1&cc_load_policy=1&hl=pt-br";
}

// 📥 Carregar dados do arquivo JSON local
function loadData(callback) {
    var xhr = new XMLHttpRequest();
    xhr.open("GET", API_URL + "?t=" + new Date().getTime(), true);
    xhr.onreadystatechange = function () {
        if (xhr.readyState === 4) {
            if (xhr.status === 200) {
                try {
                    var data = JSON.parse(xhr.responseText);
                    processData(data);
                    if (callback) callback();
                } catch (err) {
                    console.error("Erro ao analisar JSON:", err);
                }
            } else {
                console.error("Erro ao carregar dados. Status: " + xhr.status);
            }
        }
    };
    xhr.send();
}

// 🔄 Processar dados
function processData(data) {
    // Adicionado log dos dados brutos
    console.log("📊 Dados brutos extraídos do JSON:", data);

    var tempPlaylist = [];
    for (var i = 0; i < data.length; i++) {
        var item = data[i];

        // 1. Checa a coluna 'active'
        if (item.active !== undefined && item.active !== null && item.active !== "") {
            var val = String(item.active).trim().toUpperCase();
            if (val === "FALSE" || val === "FALSO" || val === "NÃO" || val === "NAO" || val === "0") {
                continue;
            }
        }

        // 2. Checa o período (startDate e endDate)
        var startStr = item.startDate || item.startdate;
        var endStr = item.endDate || item.enddate;
        if (!isDateValid(startStr, endStr)) {
            continue;
        }

        // 3. Checa url vazia
        var urlStr = item.url ? String(item.url).trim() : "";
        if (urlStr === "") {
            continue;
        }

        tempPlaylist.push({
            type: item.type ? String(item.type).trim().toLowerCase() : "image",
            url: urlStr,
            duration: parseTime(item.duration)
        });
    }
    
    playlist = tempPlaylist;

    console.log("▶️ Playlist filtrada para tocar:", playlist);
}

// 🎬 Exibir item
function show(item) {
    if (timerId) clearTimeout(timerId);

    var player = document.getElementById("player");
    player.innerHTML = "";

    var el;

    if (item.type === "image") {
        el = document.createElement("img");
        el.src = convertDrive(item.url, item.type);
        player.appendChild(el);

        timerId = setTimeout(next, item.duration);

    } else if (item.type === "video") {

        if (isYoutube(item.url)) {
            el = document.createElement("iframe");
            el.src = youtubeEmbed(item.url);
            el.allow = "autoplay; encrypted-media";
            player.appendChild(el);

            timerId = setTimeout(next, item.duration);

        } else if (item.url.indexOf("drive.google.com") !== -1) {
            // ⚠️ O Google bloqueia tag <video> do Drive. A única forma é via Iframe (player nativo)
            el = document.createElement("iframe");
            el.src = convertDrive(item.url, item.type);
            el.allow = "autoplay; encrypted-media";
            player.appendChild(el);

            timerId = setTimeout(next, item.duration);

        } else {
            el = document.createElement("video");
            el.src = convertDrive(item.url, item.type);
            el.autoplay = true;
            el.muted = true;
            el.onended = next;

            // 🛡️ Proteção contra tela preta: se o Google Drive bloquear, pula em 3s
            el.onerror = function() {
                console.warn("⚠️ Falha ao carregar vídeo (bloqueado pelo Drive). Pulando...");
                if (timerId) clearTimeout(timerId);
                timerId = setTimeout(next, 3000);
            };

            player.appendChild(el);

            // 🛡️ Fallback de segurança: avança usando o tempo da planilha caso o vídeo trave
            timerId = setTimeout(next, item.duration + 3000);
        }
    }
}

// ⏭️ Próximo item
function next() {
    if (playlist.length === 0) {
        document.getElementById("player").innerHTML = "<h1 style='color:white'>Sem conteúdo</h1>";
        timerId = setTimeout(next, 10000);
        return;
    }

    current = (current + 1) % playlist.length;
    show(playlist[current]);
}

//  Inicialização
function startApp() {
    document.getElementById("player").innerHTML = "<h1 style='color:white'>Carregando...</h1>";

    loadData(function() {
        if (playlist.length > 0) {
            show(playlist[0]);
        } else {
            document.getElementById("player").innerHTML = "<h1 style='color:white'>Sem conteúdo</h1>";
            timerId = setTimeout(next, 10000);
        }
    });
}

// 🎬 Iniciar automaticamente ao abrir a página
startApp();

</script>

</body>
</html>
