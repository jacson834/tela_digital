<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Configuração da TV Corporativa</title>
<style>
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background-color: #f4f6f8;
        margin: 0;
        padding: 20px;
        color: #333;
    }
    .container {
        max-width: 900px;
        margin: 0 auto;
        background: white;
        padding: 20px 30px;
        border-radius: 8px;
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    h1, h2 { color: #2c3e50; }
    .form-group {
        margin-bottom: 15px;
    }
    label {
        display: block;
        font-weight: bold;
        margin-bottom: 5px;
    }
    input[type="text"], select {
        width: 100%;
        padding: 8px;
        box-sizing: border-box;
        border: 1px solid #ccc;
        border-radius: 4px;
    }
    .github-setup {
        background-color: #e8f4fd;
        padding: 15px;
        border-radius: 6px;
        margin-bottom: 20px;
        border-left: 5px solid #2196F3;
    }
    .playlist-item {
        background: #fafafa;
        border: 1px solid #ddd;
        padding: 15px;
        margin-bottom: 15px;
        border-radius: 6px;
        position: relative;
    }
    .item-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
    }
    .full-width { grid-column: span 2; }
    button {
        background-color: #4CAF50;
        color: white;
        border: none;
        padding: 10px 15px;
        cursor: pointer;
        border-radius: 4px;
        font-weight: bold;
    }
    button:hover { background-color: #45a049; }
    .btn-danger { background-color: #f44336; }
    .btn-danger:hover { background-color: #da190b; }
    .btn-remove {
        position: absolute;
        top: 15px;
        right: 15px;
    }
    .header-actions {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
    }
    #status {
        margin-top: 15px;
        font-weight: bold;
    }
    .success { color: green; }
    .error { color: red; }
</style>
</head>
<body>

<div class="container">
    <h1>⚙️ Painel de Controle - TV Corporativa</h1>

    <div class="github-setup">
        <h2>Conexão com GitHub</h2>
        <p><small>Esses dados ficam salvos apenas no seu navegador local para enviar atualizações.</small></p>
        <div class="item-grid">
            <div class="form-group">
                <label>Dono do Repositório (Seu Usuário):</label>
                <input type="text" id="gh-owner" placeholder="Ex: jacson834">
            </div>
            <div class="form-group">
                <label>Nome do Repositório:</label>
                <input type="text" id="gh-repo" placeholder="Ex: tv-corporativa">
            </div>
            <div class="form-group full-width">
                <label>GitHub Token (PAT):</label>
                <input type="text" id="gh-token" placeholder="ghp_xxxxxxxxxxxxxxx">
            </div>
        </div>
        <button onclick="loadFromGitHub()">⬇️ Carregar Playlist do GitHub</button>
        <span id="load-status"></span>
    </div>

    <div class="header-actions">
        <h2>Mídias da Playlist</h2>
        <button onclick="addEmptyItem()">➕ Adicionar Nova Mídia</button>
    </div>

    <div id="playlist-container">
        <!-- Itens serão renderizados aqui -->
    </div>

    <hr>
    <button style="background-color: #2196F3; font-size: 18px; width: 100%; padding: 15px;" onclick="saveToGitHub()">🚀 Salvar Alterações no GitHub</button>
    <div id="status"></div>
</div>

<script>
    let fileSha = ""; // Guarda o código da versão atual do arquivo no GitHub
    let playlistData = [];

    // Carrega dados salvos do navegador
    document.getElementById('gh-owner').value = localStorage.getItem('ghOwner') || "";
    document.getElementById('gh-repo').value = localStorage.getItem('ghRepo') || "";
    document.getElementById('gh-token').value = localStorage.getItem('ghToken') || "";

    // Funções para lidar com Base64 com acentuação (UTF-8)
    function utf8_to_b64(str) {
        return window.btoa(unescape(encodeURIComponent(str)));
    }
    function b64_to_utf8(str) {
        return decodeURIComponent(escape(window.atob(str)));
    }

    // 1️⃣ LER DO GITHUB
    async function loadFromGitHub() {
        const owner = document.getElementById('gh-owner').value.trim();
        const repo = document.getElementById('gh-repo').value.trim();
        const token = document.getElementById('gh-token').value.trim();
        const statusEl = document.getElementById('load-status');

        if (!owner || !repo) {
            alert("Preencha Usuário e Repositório!");
            return;
        }

        // Salva localmente para facilitar nas próximas vezes
        localStorage.setItem('ghOwner', owner);
        localStorage.setItem('ghRepo', repo);
        localStorage.setItem('ghToken', token);

        statusEl.innerHTML = "Carregando...";
        statusEl.className = "";

        const url = `https://api.github.com/repos/${owner}/${repo}/contents/playlist.json`;

        try {
            const headers = { 'Accept': 'application/vnd.github.v3+json' };
            if (token) headers['Authorization'] = `token ${token}`; // Token ajuda a evitar limite de requisições, e lê repos privados

            const res = await fetch(url, { headers });
            if (!res.ok) throw new Error("Falha ao buscar arquivo. Verifique se o repositório existe.");
            
            const data = await res.json();
            fileSha = data.sha; // Precisamos do SHA para poder atualizar o arquivo depois
            
            const jsonString = b64_to_utf8(data.content);
            playlistData = JSON.parse(jsonString);
            
            renderPlaylist();
            statusEl.innerHTML = "✅ Playlist carregada com sucesso!";
            statusEl.className = "success";
        } catch (err) {
            console.error(err);
            statusEl.innerHTML = "❌ Erro ao carregar: " + err.message;
            statusEl.className = "error";
        }
    }

    // 2️⃣ RENDERIZAR NA TELA
    function renderPlaylist() {
        const container = document.getElementById('playlist-container');
        container.innerHTML = "";

        if (playlistData.length === 0) {
            container.innerHTML = "<p>A playlist está vazia.</p>";
            return;
        }

        playlistData.forEach((item, index) => {
            const div = document.createElement('div');
            div.className = "playlist-item";
            div.innerHTML = `
                <button class="btn-danger btn-remove" onclick="removeItem(${index})">🗑️ Remover</button>
                <h3>Item #${index + 1}</h3>
                <div class="item-grid">
                    <div class="form-group">
                        <label>Nome:</label>
                        <input type="text" id="name-${index}" value="${item.name || ''}" oninput="updateData(${index}, 'name', this.value)">
                    </div>
                    <div class="form-group">
                        <label>Tipo:</label>
                        <select id="type-${index}" onchange="updateData(${index}, 'type', this.value)">
                            <option value="image" ${item.type === 'image' ? 'selected' : ''}>Imagem</option>
                            <option value="video" ${item.type === 'video' ? 'selected' : ''}>Vídeo</option>
                        </select>
                    </div>
                    <div class="form-group full-width">
                        <label>URL (Link do YouTube, Drive, Vercel, etc):</label>
                        <input type="text" id="url-${index}" value="${item.url || ''}" oninput="updateData(${index}, 'url', this.value)">
                    </div>
                    <div class="form-group">
                        <label>Duração (HH:MM:SS):</label>
                        <input type="text" id="duration-${index}" value="${item.duration || '00:00:30'}" oninput="updateData(${index}, 'duration', this.value)">
                    </div>
                    <div class="form-group">
                        <label>Ativo (Exibir na TV?):</label>
                        <select id="active-${index}" onchange="updateData(${index}, 'active', this.value === 'true')">
                            <option value="true" ${String(item.active) !== 'false' ? 'selected' : ''}>Sim (Verdadeiro)</option>
                            <option value="false" ${String(item.active) === 'false' ? 'selected' : ''}>Não (Falso)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Data Início (Opcional - DD/MM/AAAA):</label>
                        <input type="text" id="start-${index}" value="${item.startDate || ''}" oninput="updateData(${index}, 'startDate', this.value)">
                    </div>
                    <div class="form-group">
                        <label>Data Fim (Opcional - DD/MM/AAAA):</label>
                        <input type="text" id="end-${index}" value="${item.endDate || ''}" oninput="updateData(${index}, 'endDate', this.value)">
                    </div>
                </div>
            `;
            container.appendChild(div);
        });
    }

    // Atualiza a variável sempre que o usuário digita algo
    function updateData(index, field, value) {
        playlistData[index][field] = value;
    }

    // Adiciona novo card em branco
    function addEmptyItem() {
        playlistData.push({
            name: "Nova Mídia",
            type: "image",
            url: "",
            duration: "00:00:30",
            startDate: "",
            endDate: "",
            active: true
        });
        renderPlaylist();
    }

    // Remove card
    function removeItem(index) {
        if(confirm("Tem certeza que deseja remover este item?")) {
            playlistData.splice(index, 1);
            renderPlaylist();
        }
    }

    // 3️⃣ SALVAR NO GITHUB
    async function saveToGitHub() {
        const owner = document.getElementById('gh-owner').value.trim();
        const repo = document.getElementById('gh-repo').value.trim();
        const token = document.getElementById('gh-token').value.trim();
        const statusEl = document.getElementById('status');

        if (!token) {
            alert("Você precisa informar o seu GitHub Token (PAT) para conseguir salvar alterações!");
            return;
        }

        if (!fileSha) {
            alert("Você precisa Carregar a Playlist atual antes de salvar!");
            return;
        }

        statusEl.innerHTML = "⏳ Enviando atualizações para o GitHub...";
        statusEl.className = "";

        const url = `https://api.github.com/repos/${owner}/${repo}/contents/playlist.json`;
        
        // Converte os dados do formulário de volta para texto JSON formatado bonito
        const newJsonString = JSON.stringify(playlistData, null, 2);
        // Converte o texto JSON em Base64 (formato exigido pelo GitHub)
        const base64Content = utf8_to_b64(newJsonString);

        const bodyData = {
            message: "Atualização da Playlist via Painel",
            content: base64Content,
            sha: fileSha // O GitHub exige a chave SHA da versão anterior para evitar conflitos
        };

        try {
            const res = await fetch(url, {
                method: "PUT",
                headers: {
                    'Accept': 'application/vnd.github.v3+json',
                    'Authorization': `token ${token}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(bodyData)
            });

            if (!res.ok) {
                const errData = await res.json();
                throw new Error(errData.message || "Erro desconhecido");
            }

            const result = await res.json();
            fileSha = result.content.sha; // Atualiza o SHA para caso a pessoa clique em salvar de novo sem recarregar a página

            statusEl.innerHTML = "🎉 Sucesso! A TV Corporativa vai receber a atualização em alguns minutos.";
            statusEl.className = "success";
        } catch (err) {
            console.error(err);
            statusEl.innerHTML = "❌ Falha ao salvar: " + err.message;
            statusEl.className = "error";
        }
    }
</script>
</body>
</html>
